<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sulaiman Hashimi — Test Automation Engineer</title>
<meta name="description" content="Test Automation Engineer with 4+ years building scalable automation frameworks across government and enterprise environments.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
:root {
  /* backgrounds — macOS system dark */
  --bg:      #000000;
  --bg2:     #1c1c1e;
  --bg3:     #2c2c2e;
  --card:    rgba(120,120,128,0.1);
  --card-h:  rgba(120,120,128,0.18);

  /* borders */
  --border:  rgba(255,255,255,0.1);
  --bh:      rgba(10,132,255,0.5);

  /* accents — Apple system colors */
  --purple:  #0A84FF;
  --purple-l:#5E9CF5;
  --purple-g:rgba(10,132,255,0.2);
  --cyan:    #5AC8FA;
  --cyan-g:  rgba(90,200,250,0.15);
  --gold:    #FFFFFF;
  --gold-g:  rgba(255,255,255,0.1);
  --green:   #30D158;
  --green-g: rgba(48,209,88,0.2);
  --coral:   #FF453A;

  /* text — Apple label system */
  --t:       rgba(255,255,255,0.92);
  --tm:      rgba(255,255,255,0.55);
  --td:      rgba(255,255,255,0.2);

  /* typography */
  --ff:      'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  --fmono:   'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

  /* radius — all containers match nav (18px) */
  --r-s:  8px;
  --r-m:  12px;
  --r-l:  18px;
  --r-xl: 22px;
  --r-f:  9999px;

  /* transitions */
  --ease:   cubic-bezier(0.4,0,0.2,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --t3:     all 0.3s var(--ease);
  --t5:     all 0.5s var(--ease);
}

/* ═══════════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; overflow-x:hidden; scroll-padding-top:80px; }
body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--t);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: none;
}
a { color:inherit; text-decoration:none; }
img { display:block; max-width:100%; }
button { cursor:none; border:none; background:none; font-family:inherit; color:inherit; }
ul { list-style:none; }

/* ═══════════════════════════════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════════════════════════════ */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9000;
}

/* ═══════════════════════════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════════════════════════ */
#cur-dot {
  width:8px; height:8px;
  background: var(--purple-l);
  border-radius:50%;
  position:fixed; top:0; left:0;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
  transition:width 0.2s, height 0.2s, background 0.2s;
}
#cur-ring {
  width:34px; height:34px;
  border:1.5px solid rgba(10,132,255,0.4);
  border-radius:50%;
  position:fixed; top:0; left:0;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9998;
  will-change:left,top;
}
#cur-dot.hov  { width:12px; height:12px; background:var(--cyan); }
#cur-ring.hov { width:50px; height:50px; border-color:rgba(90,200,250,0.45); }

/* ═══════════════════════════════════════════════════════════════
   SCROLL PROGRESS BAR
═══════════════════════════════════════════════════════════════ */
#spbar {
  position:fixed; top:0; left:0;
  height:3px; width:0%;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
  z-index:10000;
  box-shadow: 0 0 12px var(--purple-g);
  transition: width 0.1s linear;
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION — Apple Glass (macOS / iOS dark)
═══════════════════════════════════════════════════════════════ */
#nav {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  width: calc(100% - 40px);
  max-width: 1100px;
  height: 54px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: rgba(18, 18, 20, 0.72);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,0.05) inset,
    0 20px 50px rgba(0,0,0,0.6),
    0 4px 12px rgba(0,0,0,0.3);
  transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
}
#nav.stuck {
  background: rgba(18, 18, 20, 0.92);
  border-color: rgba(255,255,255,0.13);
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,0.07) inset,
    0 24px 60px rgba(0,0,0,0.7);
}

.nav-logo {
  font-size: 1rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple-l), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.03em;
  flex-shrink: 0;
}

/* Center pill — frosted link group */
.nav-links {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 4px;
  flex-shrink: 1;
  overflow: hidden;
}
.nav-links a {
  font-size: 0.79rem;
  font-weight: 600;
  color: rgba(255,255,255,0.56);
  padding: 6px 12px;
  border-radius: 8px;
  transition: color 0.2s ease, background 0.2s ease;
  white-space: nowrap;
}
.nav-links a::after { display: none; }
.nav-links a:hover {
  color: rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.1);
}
.nav-links a.active {
  color: rgba(255,255,255,0.95);
  background: rgba(255,255,255,0.16);
}

/* Language toggle — iOS segment control */
.lang-wrap {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 3px;
  flex-shrink: 0;
}
.lang-btn {
  padding: 5px 8px;
  border-radius: 7px;
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45);
  transition: all 0.2s ease;
  cursor: none;
  min-width: 32px;
  text-align: center;
}
.lang-btn.on {
  background: rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.95);
  box-shadow: 0 1px 5px rgba(0,0,0,0.35);
}

/* Hamburger — minimal iOS style */
.ham {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 9px;
  border-radius: 10px;
  background: transparent;
  transition: background 0.2s;
  flex-shrink: 0;
}
.ham:hover { background: rgba(255,255,255,0.1); }
.ham span {
  display: block;
  width: 20px;
  height: 1.5px;
  background: rgba(255,255,255,0.82);
  border-radius: 2px;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── Mobile sheet — iOS-style full-screen overlay ── */
#mob {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 498;
  padding: 90px 18px 40px;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.52);
}
#mob.open {
  display: flex;
  animation: mob-fade 0.25s ease forwards;
}
@keyframes mob-fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Link card */
#mob-links {
  background: rgba(26,26,28,0.94);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
  backdrop-filter: blur(48px) saturate(180%);
  -webkit-backdrop-filter: blur(48px) saturate(180%);
  animation: mob-slide 0.32s cubic-bezier(0.34,1.56,0.64,1) 0.04s both;
}
@keyframes mob-slide {
  from { transform: translateY(-10px) scale(0.98); opacity: 0.6; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

#mob a {
  font-size: 1.05rem;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  padding: 17px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  transition: background 0.15s, color 0.15s;
}
#mob a:last-child { border-bottom: none; }
#mob a::after {
  content: '›';
  font-size: 1.3rem;
  font-weight: 300;
  color: rgba(255,255,255,0.22);
  transition: transform 0.2s, color 0.15s;
  flex-shrink: 0;
}
#mob a:hover {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.98);
}
#mob a:hover::after {
  transform: translateX(4px);
  color: rgba(255,255,255,0.5);
}

/* Mobile language segment */
.mob-langs {
  background: rgba(26,26,28,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-l);
  padding: 5px;
  display: flex;
  gap: 3px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  animation: mob-slide 0.32s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
.mob-langs .lang-btn {
  flex: 1;
  padding: 11px 8px;
  font-size: 0.78rem;
  border-radius: 11px;
  text-align: center;
  min-width: 0;
  color: rgba(255,255,255,0.45);
}
.mob-langs .lang-btn.on {
  background: rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.95);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════════════════════════ */
#hero {
  position:relative; min-height:100vh;
  display:flex; align-items:center;
  padding:96px clamp(20px,5vw,80px) 60px;
  overflow:hidden;
}

/* Aurora orbs — CSS-only, no canvas needed */
.aurora { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.orb {
  position:absolute; border-radius:50%;
  filter:blur(90px);
  animation: orb-drift 14s ease-in-out infinite alternate;
}
.orb-1 {
  width:55%; height:55%; top:-5%; left:-5%;
  background: radial-gradient(circle, rgba(10,132,255,0.16) 0%, transparent 70%);
}
.orb-2 {
  width:45%; height:50%; top:15%; right:-8%;
  background: radial-gradient(circle, rgba(90,200,250,0.09) 0%, transparent 70%);
  animation-delay:-5s; animation-duration:17s;
}
.orb-3 {
  width:35%; height:40%; bottom:-5%; left:30%;
  background: radial-gradient(circle, rgba(10,132,255,0.07) 0%, transparent 70%);
  animation-delay:-9s; animation-duration:11s;
}
@keyframes orb-drift {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(4%,6%) scale(1.06); }
  66%  { transform: translate(-3%,2%) scale(0.94); }
  100% { transform: translate(5%,-3%) scale(1.04); }
}

/* Hero grid */
.hero-grid {
  position:relative; z-index:1;
  display:grid; grid-template-columns:1fr 1fr;
  gap:60px; align-items:center;
  width:100%; max-width:1300px; margin:0 auto;
}

/* Left side */
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: rgba(10,132,255,0.1);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border: 1px solid rgba(10,132,255,0.28);
  border-radius: var(--r-l);
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--purple-l);
  margin-bottom: 24px;
}
.badge-pulse {
  width:6px; height:6px; background:var(--purple-l); border-radius:50%;
  animation: blink-scale 2s ease-in-out infinite;
}
@keyframes blink-scale {
  0%,100% { opacity:1; transform:scale(1); }
  50%     { opacity:0.4; transform:scale(0.75); }
}

/* Animated name — letters drop in individually */
.hero-name {
  font-size: clamp(2.6rem,6.5vw,5.2rem);
  font-weight:900; line-height:1; letter-spacing:-0.04em;
  margin-bottom:14px;
}
.hero-name-line { display:block; overflow:hidden; }
.char {
  display:inline-block;
  transform:translateY(110%);
  animation: char-drop 0.75s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes char-drop { to { transform:translateY(0); } }

/* Typewriter role */
.hero-role {
  font-size:clamp(1rem,2.2vw,1.4rem); font-weight:500;
  color:var(--tm); margin-bottom:20px; min-height:2rem;
}
.typed { color:var(--cyan); }
.tcursor {
  display:inline-block; width:2px; height:1.1em;
  background:var(--cyan); vertical-align:middle; margin-left:2px;
  animation: blink-bar 1s step-end infinite;
}
@keyframes blink-bar { 0%,100%{opacity:1} 50%{opacity:0} }

.hero-bio {
  font-size:clamp(0.875rem,1.5vw,1rem);
  color:var(--tm); line-height:1.75;
  max-width:500px; margin-bottom:36px;
}

/* Buttons */
.btns { display:flex; gap:14px; flex-wrap:wrap; }
.btn {
  display:inline-flex; align-items:center; gap:9px;
  padding:14px 28px; border-radius:var(--r-l);
  font-size:0.875rem; font-weight:700;
  transition: transform 0.3s var(--spring), box-shadow 0.3s var(--ease);
  position:relative; overflow:hidden;
}
.btn-p {
  background: linear-gradient(135deg, var(--purple), var(--purple-l));
  color:#fff;
  box-shadow: 0 0 28px var(--purple-g);
}
.btn-p:hover {
  transform:translateY(-3px) scale(1.03);
  box-shadow: 0 0 48px var(--purple-g), 0 10px 36px rgba(10,132,255,0.35);
}
.btn-o {
  background: rgba(120,120,128,0.1);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  color: var(--t);
  border: 1px solid rgba(255,255,255,0.14);
}
.btn-o:hover {
  border-color: rgba(10,132,255,0.5);
  color: var(--purple-l);
  background: rgba(10,132,255,0.08);
  transform: translateY(-3px);
  box-shadow: 0 0 0 1px rgba(10,132,255,0.12);
}
.btn svg { width:17px; height:17px; stroke-width:2; flex-shrink:0; }

/* Ripple on click */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.25);
  transform:scale(0);
  animation:ripple-anim 0.6s linear;
  pointer-events:none;
}
@keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

/* Right side — photo + floating pills */
.hero-visual {
  display:flex; flex-direction:column; align-items:center; gap:28px;
}
.photo-wrap {
  position:relative;
  width:clamp(200px,26vw,320px);
  aspect-ratio:1;
}
/* Animated gradient ring */
.photo-wrap::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:conic-gradient(var(--purple), var(--cyan), var(--purple-l), var(--purple));
  animation:ring-spin 4s linear infinite;
  z-index:-1;
}
/* Outer glow */
.photo-wrap::after {
  content:''; position:absolute; inset:-28px; border-radius:50%;
  background:radial-gradient(circle, var(--purple-g) 0%, transparent 68%);
  z-index:-2;
  animation:glow-breathe 3.5s ease-in-out infinite;
}
@keyframes ring-spin { to { transform:rotate(360deg); } }
@keyframes glow-breathe {
  0%,100% { opacity:0.5; transform:scale(0.95); }
  50%     { opacity:1;   transform:scale(1.05); }
}
.hero-photo {
  width:100%; height:100%; object-fit:cover;
  border-radius:50%; border:4px solid var(--bg);
}
.hero-initials {
  width:100%; height:100%; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--purple), var(--purple-l));
  font-size:clamp(2.5rem,5vw,4rem); font-weight:900; color:#fff;
  border:4px solid var(--bg);
}

/* Floating tech pills */
.float-pills { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:340px; }
.fpill {
  padding:6px 13px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r-m);
  font-size:0.72rem; font-weight:600; color:var(--tm);
  backdrop-filter:blur(8px);
  animation:pill-bob 3.5s ease-in-out infinite;
}
.fpill:nth-child(2n)   { animation-delay:-1.75s; }
.fpill:nth-child(3n)   { animation-delay:-0.8s; }
.fpill:nth-child(4n+1) { animation-delay:-2.5s; }
@keyframes pill-bob {
  0%,100% { transform:translateY(0); }
  50%     { transform:translateY(-7px); }
}

/* Scroll indicator */
.scroll-hint {
  position:absolute; bottom:36px; left:50%;
  transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:7px;
  color:var(--td); font-size:0.68rem; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; z-index:1;
  cursor:default;
  animation:hint-float 2.2s ease-in-out infinite;
}
.scroll-hint svg { width:18px; height:18px; stroke:var(--td); }
@keyframes hint-float {
  0%,100% { opacity:0.5; transform:translateX(-50%) translateY(0); }
  50%     { opacity:1;   transform:translateX(-50%) translateY(8px); }
}

/* ═══════════════════════════════════════════════════════════════
   STATS BAND
═══════════════════════════════════════════════════════════════ */
#stats {
  background:var(--bg2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:64px clamp(20px,5vw,80px);
}
.stats-row {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:32px; max-width:960px; margin:0 auto; text-align:center;
}
.stat { display:flex; flex-direction:column; align-items:center; gap:8px; }
.stat-n {
  font-size:clamp(2.2rem,4.5vw,3.8rem); font-weight:900; line-height:1;
  letter-spacing:-0.04em;
  background:linear-gradient(135deg, var(--purple-l), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.stat-l {
  font-size:0.72rem; font-weight:700; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--tm);
}

/* ═══════════════════════════════════════════════════════════════
   MARQUEE (dual-direction infinite tape)
═══════════════════════════════════════════════════════════════ */
#marquee {
  overflow:hidden; border-bottom:1px solid var(--border);
  display:flex; flex-direction:column; gap:14px;
  padding:22px 0;
}
.m-track {
  display:flex; width:max-content;
  animation: m-left 28s linear infinite;
}
.m-track.rev { animation-direction:reverse; animation-duration:22s; }
@keyframes m-left { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.m-item {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 22px;
  font-size:0.72rem; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--td); white-space:nowrap;
}
.m-item::before { content:'◆'; color:var(--purple); font-size:0.5rem; }
#marquee:hover .m-track { animation-play-state:paused; }

/* ═══════════════════════════════════════════════════════════════
   SHARED SECTION LAYOUT
═══════════════════════════════════════════════════════════════ */
.sec { padding:100px clamp(20px,5vw,80px); }
.sec-wrap { max-width:1300px; margin:0 auto; }

.sec-head { text-align:center; margin-bottom:64px; }
.eyebrow {
  display:inline-block; font-size:0.7rem; font-weight:800;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--purple-l);
  margin-bottom:12px;
}
.sec-title {
  font-size:clamp(1.8rem,4vw,3rem); font-weight:900;
  letter-spacing:-0.03em; line-height:1.1;
  margin-bottom:14px;
}
.sec-sub { font-size:0.95rem; color:var(--tm); max-width:540px; margin:0 auto; line-height:1.65; }

/* Scroll-reveal base states */
.rv { opacity:0; transform:translateY(32px); transition:opacity 0.7s var(--ease), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
.rv.on { opacity:1; transform:translateY(0); }
.rv-s { opacity:0; transform:scale(0.91); transition:opacity 0.7s var(--ease), transform 0.7s var(--spring); }
.rv-s.on { opacity:1; transform:scale(1); }

/* ═══════════════════════════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════════════════════════ */
#services { border-bottom:1px solid var(--border); }
.svc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
.svc-card {
  background: var(--card);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 36px 28px;
  transition: border-color 0.3s, background 0.3s, transform 0.4s var(--spring), box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}
.svc-card:hover {
  border-color: rgba(10,132,255,0.45);
  background: var(--card-h);
  transform: translateY(-8px);
  box-shadow:
    0 0 0 1px rgba(10,132,255,0.18),
    0 24px 60px rgba(0,0,0,0.5),
    0 0 32px rgba(10,132,255,0.08);
}
.svc-ico {
  width:48px; height:48px; border-radius:var(--r-m);
  background: rgba(10,132,255,0.1);
  border: 1px solid rgba(10,132,255,0.18);
  display:flex; align-items:center; justify-content:center;
  color: var(--purple-l);
  margin-bottom:20px;
  flex-shrink:0;
}
.svc-ico svg { width:22px; height:22px; }
.svc-title { font-size:1.1rem; font-weight:800; margin-bottom:10px; }
.svc-desc  { font-size:0.875rem; color:var(--tm); line-height:1.7; }

/* ═══════════════════════════════════════════════════════════════
   SKILLS (level tags — no percentages)
═══════════════════════════════════════════════════════════════ */
#skills { background:var(--bg2); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }

.skill-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:36px; }
.stab {
  padding: 9px 20px; border-radius: var(--r-m);
  font-size: 0.825rem; font-weight: 700;
  color: var(--tm);
  background: rgba(120,120,128,0.08);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  border: 1px solid var(--border);
  transition: var(--t3); cursor: none;
}
.stab.on {
  background: var(--purple); color: #fff; border-color: var(--purple);
  box-shadow: 0 0 0 1px rgba(10,132,255,0.3), 0 0 20px rgba(10,132,255,0.2);
}
.stab:hover:not(.on) {
  border-color: rgba(10,132,255,0.4);
  color: var(--t);
  background: rgba(10,132,255,0.07);
}

/* Level legend */
.s-legend { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-bottom:32px; }
.s-leg { display:flex; align-items:center; gap:7px; font-size:0.72rem; font-weight:700; color:var(--tm); }
.s-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.s-dot.expert     { background:var(--gold);     box-shadow:0 0 8px var(--gold-g); }
.s-dot.advanced   { background:var(--purple-l); box-shadow:0 0 8px var(--purple-g); }
.s-dot.proficient { background:var(--cyan);     box-shadow:0 0 8px var(--cyan-g); }

/* Skill cloud */
.s-pane { display:none; }
.s-pane.on { display:block; }
.s-cloud { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:860px; margin:0 auto; }

.stag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--r-m);
  font-size: 0.85rem; font-weight: 700; border: 1px solid;
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  transition: transform 0.4s var(--spring), box-shadow 0.3s, background 0.3s, border-color 0.3s;
  position: relative;
}
.stag:hover { transform:translateY(-5px) scale(1.06); }

/* Proficiency tier colours — Apple system */
.stag.expert {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.9);
}
.stag.expert:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.36);
  box-shadow: 0 10px 28px rgba(255,255,255,0.05);
}
.stag.advanced {
  background: rgba(10,132,255,0.08);
  border-color: rgba(10,132,255,0.28);
  color: var(--purple-l);
}
.stag.advanced:hover {
  background: rgba(10,132,255,0.14);
  border-color: rgba(10,132,255,0.5);
  box-shadow: 0 10px 28px var(--purple-g);
}
.stag.proficient {
  background: rgba(90,200,250,0.06);
  border-color: rgba(90,200,250,0.22);
  color: var(--cyan);
}
.stag.proficient:hover {
  background: rgba(90,200,250,0.12);
  border-color: rgba(90,200,250,0.44);
  box-shadow: 0 10px 28px var(--cyan-g);
}

.stag-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.stag.expert   .stag-dot { background:var(--gold);     box-shadow:0 0 6px var(--gold-g); }
.stag.advanced .stag-dot { background:var(--purple-l); box-shadow:0 0 6px var(--purple-g); }
.stag.proficient .stag-dot { background:var(--cyan);   box-shadow:0 0 6px var(--cyan-g); }

.stag-yr { font-size:0.62rem; font-weight:700; opacity:0.55; letter-spacing:0.04em; font-family:var(--fmono); }

/* ═══════════════════════════════════════════════════════════════
   EXPERIENCE TIMELINE
═══════════════════════════════════════════════════════════════ */
#experience { border-bottom:1px solid var(--border); }
.timeline {
  position:relative; max-width:880px; margin:0 auto;
}
/* Glowing gradient spine */
.timeline::before {
  content:''; position:absolute;
  left:28px; top:0; bottom:0; width:2px;
  background:linear-gradient(to bottom, var(--purple) 0%, var(--cyan) 60%, transparent 100%);
  box-shadow:0 0 12px var(--purple-g);
}
.tl-item { position:relative; padding:0 0 44px 76px; }
.tl-item:last-child { padding-bottom:0; }

/* Timeline dot */
.tl-dot {
  position:absolute; left:20px; top:18px;
  width:18px; height:18px; border-radius:50%;
  background:var(--purple); border:3px solid var(--bg);
  box-shadow:0 0 0 2px var(--purple), 0 0 18px var(--purple-g);
  transition:transform 0.3s var(--spring);
}
.tl-item:first-child .tl-dot {
  background:var(--cyan);
  box-shadow:0 0 0 2px var(--cyan), 0 0 18px var(--cyan-g);
}
.tl-item:hover .tl-dot { transform:scale(1.35); }

/* Experience card */
.exp-card {
  background: var(--card);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 24px 28px;
  transition: border-color 0.3s, transform 0.35s var(--ease), box-shadow 0.3s;
}
.exp-card:hover {
  border-color: rgba(10,132,255,0.45);
  transform: translateX(5px);
  box-shadow:
    0 0 0 1px rgba(10,132,255,0.18),
    0 8px 40px rgba(0,0,0,0.35);
}
.exp-head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:6px; }
.exp-title { font-size:1rem; font-weight:800; }
.exp-badge {
  font-size:0.7rem; font-weight:700;
  padding:4px 11px; border-radius:var(--r-s);
  background: rgba(10,132,255,0.1);
  border: 1px solid rgba(10,132,255,0.22);
  color: var(--purple-l); white-space:nowrap; flex-shrink:0;
}
.exp-cur .exp-badge {
  background: rgba(48,209,88,0.1);
  border-color: rgba(48,209,88,0.28);
  color: var(--green);
}
.exp-co { font-size:0.85rem; font-weight:700; color:var(--tm); margin-bottom:12px; }
.exp-desc { font-size:0.875rem; color:var(--tm); line-height:1.7; margin-bottom:16px; }
.exp-tags { display:flex; flex-wrap:wrap; gap:6px; }
.exp-tag {
  padding:3px 10px; background: rgba(120,120,128,0.12); border:1px solid var(--border);
  border-radius:var(--r-s); font-size:0.68rem; font-weight:700;
  color:var(--tm); font-family:var(--fmono); letter-spacing:0.02em;
}

/* ═══════════════════════════════════════════════════════════════
   CERTIFICATIONS
═══════════════════════════════════════════════════════════════ */
#certifications { background:var(--bg2); border-top:1px solid var(--border); }
.cert-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:18px; }
.cert-card {
  background: var(--card);
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 24px 18px; text-align:center;
  transition: border-color 0.3s, transform 0.4s var(--spring), box-shadow 0.3s;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(24px);
}
.cert-card.on {
  animation:cert-in 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes cert-in { to { opacity:1; transform:translateY(0); } }
.cert-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--purple-g), transparent);
  opacity:0; transition:opacity 0.3s;
}
.cert-card:hover {
  border-color:var(--bh); transform:translateY(-6px);
  box-shadow:0 16px 48px rgba(0,0,0,0.4);
}
.cert-card:hover::after { opacity:1; }
.cert-ico {
  width:44px; height:44px; border-radius:var(--r-m);
  background: rgba(120,120,128,0.12);
  border: 1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px;
  color: var(--tm);
}
.cert-ico svg { width:20px; height:20px; }
.cert-name { font-size:0.78rem; font-weight:700; color:var(--t); line-height:1.4; position:relative; z-index:1; }
.cert-year { font-size:0.65rem; color:var(--td); margin-top:6px; font-family:var(--fmono); position:relative; z-index:1; }

/* ═══════════════════════════════════════════════════════════════
   EDUCATION
═══════════════════════════════════════════════════════════════ */
#education { border-top:1px solid var(--border); }
.edu-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; max-width:840px; margin:0 auto; }
.edu-card {
  background: var(--card);
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 28px 24px;
  transition: border-color 0.3s, transform 0.4s var(--spring), box-shadow 0.3s;
}
.edu-card:hover {
  border-color:var(--bh); transform:translateY(-6px);
  box-shadow:0 12px 44px rgba(0,0,0,0.35);
}
.edu-ico {
  width:44px; height:44px; border-radius:var(--r-m);
  background: rgba(10,132,255,0.1);
  border: 1px solid rgba(10,132,255,0.18);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:16px;
  color: var(--purple-l);
}
.edu-ico svg { width:20px; height:20px; }
.edu-deg  { font-size:1rem; font-weight:800; margin-bottom:6px; line-height:1.3; }
.edu-sch  { font-size:0.875rem; font-weight:700; color:var(--purple-l); margin-bottom:4px; }
.edu-per  { font-size:0.78rem; color:var(--tm); }

/* ═══════════════════════════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════════════════════════ */
#contact { background:var(--bg2); border-top:1px solid var(--border); }
.contact-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:56px;
  max-width:980px; margin:0 auto; align-items:start;
}
.contact-left h3 { font-size:1.5rem; font-weight:900; letter-spacing:-0.02em; margin-bottom:12px; }
.contact-left p  { color:var(--tm); line-height:1.7; margin-bottom:28px; }

/* Available badge */
.avail {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 8px 16px; border-radius: var(--r-l);
  background: rgba(48,209,88,0.08);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  border: 1px solid rgba(48,209,88,0.22);
  color: var(--green); font-size: 0.8rem; font-weight: 700;
  margin-bottom: 24px;
}
.avail-dot {
  width:8px; height:8px; background:var(--green); border-radius:50%;
  box-shadow:0 0 0 0 var(--green-g);
  animation: avail-pulse 2s infinite;
}
@keyframes avail-pulse {
  0%   { box-shadow:0 0 0 0 rgba(48,209,88,0.5); }
  70%  { box-shadow:0 0 0 10px rgba(48,209,88,0); }
  100% { box-shadow:0 0 0 0 rgba(48,209,88,0); }
}

/* Contact links — all are real hrefs */
.c-links { display:flex; flex-direction:column; gap:12px; }
.c-link {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  backdrop-filter: blur(16px) saturate(150%);
  -webkit-backdrop-filter: blur(16px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-m); color: var(--t);
  transition: border-color 0.3s, background 0.3s, transform 0.3s var(--ease), box-shadow 0.3s;
}
.c-link:hover {
  border-color:var(--bh); background:var(--card-h);
  transform:translateX(7px);
  box-shadow:0 4px 24px rgba(0,0,0,0.25);
}
.c-ico {
  width:42px; height:42px; border-radius:var(--r-m);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  background: rgba(120,120,128,0.14);
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.72);
}
.c-ico svg { width:18px; height:18px; }
.c-txt .lbl { font-size:0.65rem; font-weight:800; color:var(--tm); text-transform:uppercase; letter-spacing:0.1em; }
.c-txt .val { font-size:0.9rem; font-weight:700; }

/* Contact right — decorative card */
.contact-deco {
  height:100%; min-height:300px;
  display:flex; align-items:center; justify-content:center;
  background: var(--card);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: var(--r-xl); padding:40px;
  text-align:center;
}
.contact-deco-inner { display:flex; flex-direction:column; align-items:center; gap:12px; }
.deco-emoji { font-size:4rem; animation:float-e 4s ease-in-out infinite; }
@keyframes float-e { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.deco-title { font-size:1.25rem; font-weight:800; }
.deco-sub   { font-size:0.85rem; color:var(--tm); line-height:1.6; max-width:240px; }

/* ═══════════════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════════════ */
#footer {
  border-top:1px solid var(--border);
  padding:36px clamp(20px,5vw,80px);
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:16px;
}
.foot-logo { font-size:1rem; font-weight:900; background:linear-gradient(135deg,var(--purple-l),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.foot-copy { font-size:0.75rem; color:var(--td); }
.foot-links { display:flex; gap:22px; }
.foot-links a { font-size:0.78rem; color:var(--tm); transition:color 0.25s; }
.foot-links a:hover { color:var(--t); }

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
═══════════════════════════════════════════════════════════════ */
@media (max-width:1024px) {
  .hero-grid    { grid-template-columns:1fr; text-align:center; }
  .hero-bio     { margin:0 auto 36px; }
  .btns         { justify-content:center; }
  .hero-visual  { order:-1; }
  .svc-grid     { grid-template-columns:1fr 1fr; }
  .contact-grid { grid-template-columns:1fr; }
  .edu-grid     { grid-template-columns:1fr; max-width:500px; }
  .nav-links    { gap: 1px; }
  .nav-links a  { padding: 6px 10px; font-size: 0.76rem; }
}
@media (max-width:768px) {
  #nav           { width:calc(100% - 24px); top:12px; height:50px; padding:0 14px; border-radius:14px; }
  #mob           { padding-top: 78px; }
  .stats-row     { grid-template-columns:repeat(2,1fr); }
  .svc-grid      { grid-template-columns:1fr; }
  .nav-links, .lang-wrap { display:none; }
  .ham           { display:flex; }
  .scroll-hint   { display:none; }
  .timeline::before { left:18px; }
  .tl-item       { padding-left:56px; }
  .tl-dot        { left:10px; }
  .cert-grid     { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
}
@media (max-width:480px) {
  #nav           { width:calc(100% - 16px); top:8px; }
  #mob           { padding-top: 70px; padding-left: 14px; padding-right: 14px; }
  .stats-row     { grid-template-columns:1fr 1fr; gap:20px; }
  .btns          { flex-direction:column; align-items:center; }
  .btn           { width:100%; justify-content:center; }
  .contact-deco  { display:none; }
}

/* ── Touch / mobile — disable custom cursor entirely ── */
@media (hover: none), (pointer: coarse) {
  body, button, a { cursor: auto !important; }
  #cur-dot, #cur-ring { display: none !important; }
}

</style>
</head>
<body>

<!-- Scroll progress -->
<div id="spbar"></div>

<!-- Custom cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- ════════════════════════════ NAV ════════════════════════════ -->
<nav id="nav">
  <a class="nav-logo" href="#hero">SH</a>
  <ul class="nav-links" id="nav-links"></ul>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="lang-wrap" id="lang-wrap"></div>
    <button class="ham" id="ham" onclick="toggleMob()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile drawer -->
<div id="mob">
  <div id="mob-links"></div>
  <div class="mob-langs" id="mob-langs"></div>
</div>

<!-- ════════════════════════════ HERO ════════════════════════════ -->
<section id="hero">
  <div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="hero-grid">
    <!-- Text column -->
    <div id="hero-left"></div>

    <!-- Photo + pills column -->
    <div class="hero-visual" id="hero-right"></div>
  </div>

  <div class="scroll-hint" onclick="scrollTo(0,window.innerHeight)">
    <span id="scroll-hint-lbl">Scroll</span>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</section>

<!-- ════════════════════════════ STATS ════════════════════════════ -->
<section id="stats">
  <div class="stats-row" id="stats-row"></div>
</section>

<!-- ════════════════════════════ MARQUEE ════════════════════════════ -->
<div id="marquee"></div>

<!-- ════════════════════════════ SERVICES ════════════════════════════ -->
<section class="sec" id="services">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow">What I Do</span>
      <h2 class="sec-title" id="svc-title"></h2>
      <p class="sec-sub" id="svc-sub"></p>
    </div>
    <div class="svc-grid" id="svc-grid"></div>
  </div>
</section>

<!-- ════════════════════════════ SKILLS ════════════════════════════ -->
<section class="sec" id="skills">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="sk-eye"></span>
      <h2 class="sec-title" id="sk-title"></h2>
      <p class="sec-sub" id="sk-sub"></p>
    </div>
    <div id="skills-inner"></div>
  </div>
</section>

<!-- ════════════════════════════ EXPERIENCE ════════════════════════════ -->
<section class="sec" id="experience">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="exp-eye"></span>
      <h2 class="sec-title" id="exp-title"></h2>
    </div>
    <div class="timeline" id="exp-list"></div>
  </div>
</section>

<!-- ════════════════════════════ CERTIFICATIONS ════════════════════════════ -->
<section class="sec" id="certifications">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="cert-eye"></span>

// i18n field from cv.json (falls back to en value)
function lc(obj, field) {
  const i18n = D?.i18n?.[LANG];
  if (i18n?.[field]) return i18n[field];
  return obj?.[field] ?? '';
}

async function boot() {
  try {
    const res = await fetch('./data/cv.json');
    D = await res.json();
  } catch(e) {
    D = {};
  }
  render();
  // one-time inits that don't change on language switch
  initCursor();
  initScrollProgress();
  initNavStuck();
  typeRole();
}

function setLang(l) {
  LANG = l;
  localStorage.setItem('cv_lang', l);
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity 0.2s ease';
  setTimeout(() => {
    render();
    typeRole();
    document.body.style.opacity = '1';
  }, 200);
}

function renderNav() {
  const nav   = t('nav');
  const navId = t('navId');

  // Desktop links
  document.getElementById('nav-links').innerHTML =
    nav.map((l,i) => `<li><a href="#${navId[i]}" onclick="closeMob()">${l}</a></li>`).join('');

  // Lang toggle (desktop)
  const lw = (id) =>
    ALL_LANGS.map(l =>
      `<button class="lang-btn${LANG===l?' on':''}" onclick="setLang('${l}')">${LANG_LABEL[l]}</button>`
    ).join('');
  document.getElementById('lang-wrap').innerHTML = lw('lang-wrap');

  // Mobile nav + lang
  document.getElementById('mob-links').innerHTML =
    nav.map((l,i) => `<a href="#${navId[i]}" onclick="closeMob()">${l}</a>`).join('');
  document.getElementById('mob-langs').innerHTML = lw('mob-langs');
}

// TYPEWRITER EFFECT
// ═══════════════════════════════════════════════════════════════
let _typeTimer = null;
function typeRole() {
  const el = document.getElementById('typed-text');
  if (!el) return;
  clearTimeout(_typeTimer);
  el.textContent = '';
  const text = window._role || '';
  let i = 0;
  function next() {
    if (i < text.length) { el.textContent += text[i++]; _typeTimer = setTimeout(next, 55); }
  }
  // Small delay so the name animation has started
  _typeTimer = setTimeout(next, 400);
}

// ═══════════════════════════════════════════════════════════════
// RENDER: SKILLS
// ═══════════════════════════════════════════════════════════════
function renderSkills() {
  document.getElementById('sk-eye').textContent   = t('skEye');
  document.getElementById('sk-title').textContent = t('skTitle');
  document.getElementById('sk-sub').textContent   = t('skSub');

  const tabs   = D?.skillTabs || {};
  const keys   = Object.keys(tabs);
  const tLbls  = t('tabs') || {};
  const lLbls  = t('levels') || {};
  const yrLbl  = t('yr') || 'yr';

  // Build a skill tag HTML element
  const makeTag = s => {
    const lvl = s.level || 'proficient';
    const yr  = s.years ? `<span class="stag-yr">${s.years}${yrLbl}</span>` : '';
    return `<span class="stag ${lvl}"><span class="stag-dot"></span>${s.n}${yr}</span>`;
  };

  // Legend
  const legend = `
    <div class="s-legend">
      ${['expert','advanced','proficient'].map(l =>
        `<div class="s-leg"><div class="s-dot ${l}"></div><span>${lLbls[l]||l}</span></div>`
      ).join('')}
    </div>`;

  // Tab buttons (category tabs + "All")
  const allKeys = [...keys, 'all'];
  const tabBtns = allKeys.map((k,i) =>
    `<button class="stab${i===0?' on':''}" id="stab-${k}" onclick="switchSkillTab('${k}')">${tLbls[k]||k}</button>`
  ).join('');

  // Panes
  const panes = keys.map((k,i) =>
    `<div class="s-pane${i===0?' on':''}" id="sp-${k}">
      <div class="s-cloud">${tabs[k].map(makeTag).join('')}</div>
    </div>`
  ).join('');

  const allSkills = keys.flatMap(k => tabs[k]);
  const allPane = `<div class="s-pane" id="sp-all"><div class="s-cloud">${allSkills.map(makeTag).join('')}</div></div>`;

  document.getElementById('skills-inner').innerHTML =
    `<div class="skill-tabs">${tabBtns}</div>` + legend + panes + allPane;
}

function switchSkillTab(key) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.s-pane').forEach(p => p.classList.remove('on'));
  document.getElementById('stab-' + key)?.classList.add('on');
  document.getElementById('sp-' + key)?.classList.add('on');
}

// ═══════════════════════════════════════════════════════════════
// CUSTOM CURSOR  (dot tracks instantly; ring lags)
// ═══════════════════════════════════════════════════════════════
function initCursor() {
  // Skip entirely on touch/pointer-coarse devices (phones, tablets)
  if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;

  const dot  = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  let rx = 0, ry = 0, mx = 0, my = 0, rafId;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top  = my + 'px';
  }, {passive:true});

  // Ring follows with linear interpolation (ease-out feel)
  function trackRing() {
    rx += (mx - rx) * 0.14;
    ry += (my - ry) * 0.14;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    rafId = requestAnimationFrame(trackRing);
  }
  trackRing();

  // Hover state via event delegation
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a,button,.stag,.svc-card,.cert-card,.c-link,.exp-card')) {
      dot.classList.add('hov'); ring.classList.add('hov');
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a,button,.stag,.svc-card,.cert-card,.c-link,.exp-card')) {
      dot.classList.remove('hov'); ring.classList.remove('hov');
    }
  });
}

  const bar = document.getElementById('spbar');
  window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    bar.style.width = Math.min(pct, 100) + '%';
  }, {passive:true});
}

// ═══════════════════════════════════════════════════════════════
// NAV: add "stuck" class on scroll
// ═══════════════════════════════════════════════════════════════
function initNavStuck() {
  const nav = document.getElementById('nav');
  function updateActive() {
    const ids = t('navId');
    const top = window.scrollY + 100;
    let cur = ids[0];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top + window.scrollY <= top) cur = id;
    });
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + cur);
    });
  }
  window.addEventListener('scroll', () => {
    nav.classList.toggle('stuck', window.scrollY > 60);
    updateActive();
  }, {passive:true});
  updateActive();
}

// ═══════════════════════════════════════════════════════════════
// SCROLL REVEAL  (Intersection Observer on .rv and .rv-s)
// ═══════════════════════════════════════════════════════════════
function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); }
    });
  }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv,.rv-s').forEach(el => obs.observe(el));

  // Cert grid: stagger each card with a short delay
  const certObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.querySelectorAll('.cert-card').forEach((card,i) => {
        setTimeout(() => card.classList.add('on'), i * 65);
      });
      certObs.unobserve(entry.target);
    });
  }, {threshold:0.05});
  const cg = document.getElementById('cert-grid');
  if (cg) certObs.observe(cg);
}

// ═══════════════════════════════════════════════════════════════
// COUNT-UP ANIMATION  (stat numbers)
// ═══════════════════════════════════════════════════════════════
function initCountUp() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el  = e.target;
      const raw = el.dataset.raw || '';
      // Extract leading number and suffix (e.g. "4+" → num=4, suf="+"; "1M+" → num=1, suf="M+")
      const m   = raw.match(/^([\d.]+)(.*)/);
      if (!m) return;
      const target = parseFloat(m[1]);
      const suffix = m[2];
      let current  = 0;
      const step   = target / 50;
      const tick   = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = (Number.isInteger(target) ? Math.floor(current) : current.toFixed(1)) + suffix;
        if (current >= target) clearInterval(tick);
      }, 18);
      obs.unobserve(el);
    });
  }, {threshold:0.6});
  document.querySelectorAll('.stat-n[data-raw]').forEach(el => obs.observe(el));
}

// ═══════════════════════════════════════════════════════════════
// MAGNETIC BUTTONS  (elements that follow cursor slightly)
// ═══════════════════════════════════════════════════════════════
function initMagnetic() {
  // Skip on touch devices — mousemove won't fire and it wastes listeners
  if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;
  document.querySelectorAll('.magnetic').forEach(el => {
    el.addEventListener('mousemove', e => {
      const r  = el.getBoundingClientRect();
      const dx = (e.clientX - r.left - r.width  / 2) * 0.28;
      const dy = (e.clientY - r.top  - r.height / 2) * 0.28;
      el.style.transform = `translate(${dx}px,${dy}px)`;
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// CLICK RIPPLE  (on .btn elements)
// ═══════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const r    = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});

}
