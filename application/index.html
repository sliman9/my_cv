<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sulaiman Hashimi — Test Automation Engineer</title>
<meta name="description" content="Test Automation Engineer with 4+ years building scalable automation frameworks across government and enterprise environments.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════════════════
   1. DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
:root {
  /* backgrounds */
  --bg:      #000000;
  --bg2:     #0e0e16;
  --bg3:     #17172280;

  /* glass surfaces */
  --card:    rgba(99,102,241,0.04);
  --card-h:  rgba(99,102,241,0.09);

  /* borders — ONE value used everywhere */
  --border:  rgba(255,255,255,0.08);
  --bh:      rgba(99,102,241,0.45);

  /* accents — indigo palette */
  --purple:  #6366F1;
  --purple-l:#818CF8;
  --purple-g:rgba(99,102,241,0.18);
  --cyan:    #67E8F9;
  --cyan-g:  rgba(103,232,249,0.1);
  --gold:    #FFFFFF;
  --gold-g:  rgba(255,255,255,0.1);
  --green:   #34D399;
  --green-g: rgba(52,211,153,0.15);
  --coral:   #FF453A;

  /* text */
  --t:       rgba(255,255,255,0.92);
  --tm:      rgba(255,255,255,0.52);
  --td:      rgba(255,255,255,0.18);

  /* typography */
  --ff:      'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  --fmono:   'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

  /* radius */
  --r-s:  6px;
  --r-m:  10px;
  --r-l:  14px;
  --r-xl: 18px;
  --r-f:  9999px;

  /* transitions */
  --ease:   cubic-bezier(0.4,0,0.2,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --t3:     all 0.3s var(--ease);
  --t5:     all 0.5s var(--ease);
}

/* ═══════════════════════════════════════════════════════════════
   2. RESET
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; overflow-x:hidden; scroll-padding-top:120px; }
body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--t);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: none;
}
a { color:inherit; text-decoration:none; }
img { display:block; max-width:100%; }
button { cursor:none; border:none; background:none; font-family:inherit; color:inherit; }
ul { list-style:none; }

/* ═══════════════════════════════════════════════════════════════
   3. NOISE OVERLAY + CURSOR + SCROLL BAR
═══════════════════════════════════════════════════════════════ */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
  z-index: 9000;
}

#cur-dot {
  width:8px; height:8px;
  background: var(--purple-l);
  border-radius:50%;
  position:fixed; top:0; left:0;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
  transition:width 0.2s, height 0.2s, background 0.2s;
}
#cur-ring {
  width:34px; height:34px;
  border:1px solid rgba(99,102,241,0.4);
  border-radius:50%;
  position:fixed; top:0; left:0;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9998;
  will-change:left,top;
}
#cur-dot.hov  { width:12px; height:12px; background:var(--cyan); }
#cur-ring.hov { width:50px; height:50px; border-color:rgba(103,232,249,0.45); }

#spbar {
  position:fixed; top:0; left:0;
  height:3px; width:0%;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
  z-index:10000;
  box-shadow: 0 0 12px var(--purple-g);
  transition: width 0.1s linear;
}

/* ═══════════════════════════════════════════════════════════════
   4. LANGUAGE ISLAND (top-right)
═══════════════════════════════════════════════════════════════ */
.lang-island {
  position: fixed;
  top: 20px;
  right: 24px;
  z-index: 500;
}
.lang-wrap {
  display: flex;
  gap: 2px;
  background: rgba(10,10,18,0.75);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-m);
  padding: 3px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 -1px 0 rgba(0,0,0,0.25) inset,
    0 16px 40px rgba(0,0,0,0.5);
}
.lang-btn {
  padding: 5px 8px;
  border-radius: var(--r-s);
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45);
  transition: all 0.2s ease;
  cursor: none;
  min-width: 32px;
  text-align: center;
}
.lang-btn.on {
  background: rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.95);
  box-shadow: 0 1px 5px rgba(0,0,0,0.35);
}
.lang-btn:hover:not(.on) {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.75);
}

/* ═══════════════════════════════════════════════════════════════
   5. BOTTOM DOCK
═══════════════════════════════════════════════════════════════ */
#dock {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
}
.dock-glass {
  background: rgba(10,10,18,0.75);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-xl);
  padding: 6px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 -1px 0 rgba(0,0,0,0.25) inset,
    0 24px 64px rgba(0,0,0,0.6);
}
#nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
}
#nav-links li { display: flex; align-items: stretch; }
.dock-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 18px;
  border-radius: var(--r-l);
  transition: background 0.2s, transform 0.3s var(--spring), color 0.2s, border-color 0.2s;
  color: rgba(255,255,255,0.55);
  border: 1px solid transparent;
}
.dock-item:hover {
  background: rgba(255,255,255,0.08);
  transform: scale(1.1) translateY(-3px);
  color: rgba(255,255,255,0.92);
}
.dock-item.active {
  background: rgba(99,102,241,0.14);
  color: var(--purple-l);
  border: 1px solid rgba(99,102,241,0.25);
}
.dock-icon { width: 20px; height: 20px; flex-shrink: 0; }
.dock-icon svg { width: 100%; height: 100%; display: block; }
.dock-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: inherit;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════════════
   6. MOBILE ADJUSTMENTS FOR DOCK
═══════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .dock-label { display: none; }
  .dock-item  { padding: 10px 14px; }
  #dock       { bottom: 16px; }
  .lang-island { top: 14px; right: 14px; }
}
@media (max-width: 480px) {
  .dock-item  { padding: 10px 10px; }
  .dock-icon  { width: 18px; height: 18px; }
}

/* ═══════════════════════════════════════════════════════════════
   7. HERO SECTION (centered layout)
═══════════════════════════════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px clamp(20px,5vw,80px) 140px;
  position: relative;
  overflow: hidden;
  text-align: center;
}

/* Aurora orbs */
.aurora { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.orb {
  position:absolute; border-radius:50%;
  filter:blur(90px);
  animation: orb-drift 14s ease-in-out infinite alternate;
}
.orb-1 {
  width:55%; height:55%; top:-5%; left:-5%;
  background: radial-gradient(circle, rgba(99,102,241,0.16) 0%, transparent 70%);
}
.orb-2 {
  width:45%; height:50%; top:15%; right:-8%;
  background: radial-gradient(circle, rgba(103,232,249,0.09) 0%, transparent 70%);
  animation-delay:-5s; animation-duration:17s;
}
.orb-3 {
  width:35%; height:40%; bottom:-5%; left:30%;
  background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 70%);
  animation-delay:-9s; animation-duration:11s;
}
@keyframes orb-drift {
  0%   { transform: translate(0,0) scale(1); }
  33%  { transform: translate(4%,6%) scale(1.06); }
  66%  { transform: translate(-3%,2%) scale(0.94); }
  100% { transform: translate(5%,-3%) scale(1.04); }
}

.hero-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  position: relative;
  z-index: 1;
  max-width: 720px;
  width: 100%;
}

/* Badge */
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: rgba(99,102,241,0.1);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  border: 1px solid rgba(99,102,241,0.28);
  border-radius: var(--r-l);
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--purple-l);
}
.badge-pulse {
  width:6px; height:6px; background:var(--purple-l); border-radius:50%;
  animation: blink-scale 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes blink-scale {
  0%,100% { opacity:1; transform:scale(1); }
  50%     { opacity:0.4; transform:scale(0.75); }
}

/* Photo */
.photo-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  flex-shrink: 0;
}
.photo-wrap::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:conic-gradient(var(--purple), var(--cyan), var(--purple-l), var(--purple));
  animation:ring-spin 4s linear infinite;
  z-index:-1;
}
.photo-wrap::after {
  content:''; position:absolute; inset:-28px; border-radius:50%;
  background:radial-gradient(circle, var(--purple-g) 0%, transparent 68%);
  z-index:-2;
  animation:glow-breathe 3.5s ease-in-out infinite;
}
@keyframes ring-spin { to { transform:rotate(360deg); } }
@keyframes glow-breathe {
  0%,100% { opacity:0.5; transform:scale(0.95); }
  50%     { opacity:1;   transform:scale(1.05); }
}
.hero-photo {
  width:100%; height:100%; object-fit:cover;
  border-radius:50%; border:4px solid var(--bg);
}
.hero-initials {
  width:100%; height:100%; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--purple), var(--purple-l));
  font-size:3rem; font-weight:900; color:#fff;
  border:4px solid var(--bg);
}

/* Name */
.hero-name {
  font-size: clamp(2.2rem,5.5vw,4rem);
  font-weight:900; line-height:1.05; letter-spacing:-0.04em;
}
.hero-name-line { display:block; overflow:hidden; }
.char {
  display:inline-block;
  transform:translateY(110%);
  animation: char-drop 0.75s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes char-drop { to { transform:translateY(0); } }

/* Typewriter role */
.hero-role {
  font-size:clamp(1rem,2.2vw,1.35rem); font-weight:500;
  color:var(--tm); min-height:2rem;
}
.typed { color:var(--cyan); }
.tcursor {
  display:inline-block; width:2px; height:1.1em;
  background:var(--cyan); vertical-align:middle; margin-left:2px;
  animation: blink-bar 1s step-end infinite;
}
@keyframes blink-bar { 0%,100%{opacity:1} 50%{opacity:0} }

.hero-bio {
  font-size:clamp(0.875rem,1.5vw,1rem);
  color:var(--tm); line-height:1.75;
  max-width:540px;
}

/* Buttons */
.btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.btn {
  display:inline-flex; align-items:center; gap:9px;
  padding:14px 28px; border-radius:var(--r-l);
  font-size:0.875rem; font-weight:700;
  transition: transform 0.3s var(--spring), box-shadow 0.3s var(--ease);
  position:relative; overflow:hidden;
}
.btn-p {
  background: linear-gradient(135deg, var(--purple), var(--purple-l));
  color:#fff;
  box-shadow: 0 0 28px var(--purple-g);
}
.btn-p:hover {
  transform:translateY(-3px) scale(1.03);
  box-shadow: 0 0 48px var(--purple-g), 0 10px 36px rgba(99,102,241,0.35);
}
.btn-o {
  background: rgba(120,120,128,0.1);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  color: var(--t);
  border: 1px solid var(--border);
}
.btn-o:hover {
  border-color: rgba(99,102,241,0.5);
  color: var(--purple-l);
  background: rgba(99,102,241,0.08);
  transform: translateY(-3px);
  box-shadow: 0 0 0 1px rgba(99,102,241,0.12);
}
.btn svg { width:17px; height:17px; stroke-width:2; flex-shrink:0; }

/* Ripple */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.25);
  transform:scale(0);
  animation:ripple-anim 0.6s linear;
  pointer-events:none;
}
@keyframes ripple-anim { to { transform:scale(4); opacity:0; } }

/* Floating pills */
.float-pills { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:540px; }
.fpill {
  padding:6px 13px;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r-m);
  font-size:0.72rem; font-weight:600; color:var(--tm);
  backdrop-filter:blur(8px);
  animation:pill-bob 3.5s ease-in-out infinite;
}
.fpill:nth-child(2n)   { animation-delay:-1.75s; }
.fpill:nth-child(3n)   { animation-delay:-0.8s; }
.fpill:nth-child(4n+1) { animation-delay:-2.5s; }
@keyframes pill-bob {
  0%,100% { transform:translateY(0); }
  50%     { transform:translateY(-7px); }
}

/* Scroll hint */
.scroll-hint {
  position:absolute; bottom:100px; left:50%;
  transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:7px;
  color:var(--td); font-size:0.68rem; font-weight:700;
  letter-spacing:0.12em; text-transform:uppercase; z-index:1;
  cursor:default;
  animation:hint-float 2.2s ease-in-out infinite;
}
.scroll-hint svg { width:18px; height:18px; stroke:var(--td); }
@keyframes hint-float {
  0%,100% { opacity:0.5; transform:translateX(-50%) translateY(0); }
  50%     { opacity:1;   transform:translateX(-50%) translateY(8px); }
}

/* ═══════════════════════════════════════════════════════════════
   8. STATS BAND
═══════════════════════════════════════════════════════════════ */
#stats {
  background: rgba(10,10,18,0.6);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:64px clamp(20px,5vw,80px);
}
.stats-row {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:32px; max-width:960px; margin:0 auto;
}
.stat {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding: 24px 16px;
  background: rgba(99,102,241,0.04);
  border: 1px solid rgba(99,102,241,0.1);
  border-radius: var(--r-l);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  text-align: center;
}
.stat-n {
  font-size:clamp(2.2rem,4.5vw,3.8rem); font-weight:900; line-height:1;
  letter-spacing:-0.04em;
  background:linear-gradient(135deg, var(--purple-l), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.stat-l {
  font-size:0.72rem; font-weight:700; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--tm);
}

/* ═══════════════════════════════════════════════════════════════
   9. MARQUEE
═══════════════════════════════════════════════════════════════ */
#marquee {
  overflow:hidden; border-bottom:1px solid var(--border);
  display:flex; flex-direction:column; gap:14px;
  padding:22px 0;
}
.m-track {
  display:flex; width:max-content;
  animation: m-left 28s linear infinite;
}
.m-track.rev { animation-direction:reverse; animation-duration:22s; }
@keyframes m-left { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.m-item {
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 22px;
  font-size:0.72rem; font-weight:700; letter-spacing:0.06em;
  text-transform:uppercase; color:var(--td); white-space:nowrap;
}
.m-item::before { content:'◆'; color:var(--purple); font-size:0.5rem; }
#marquee:hover .m-track { animation-play-state:paused; }

/* ═══════════════════════════════════════════════════════════════
   10. SHARED SECTION LAYOUT
═══════════════════════════════════════════════════════════════ */
.sec { padding:100px clamp(20px,5vw,80px); }
.sec-wrap { max-width:1300px; margin:0 auto; }

.sec-head { text-align:center; margin-bottom:64px; }
.eyebrow {
  display:inline-block; font-size:0.7rem; font-weight:800;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--purple-l);
  margin-bottom:12px;
}
.sec-title {
  font-size:clamp(1.8rem,4vw,3rem); font-weight:900;
  letter-spacing:-0.03em; line-height:1.1;
  margin-bottom:14px;
}
.sec-sub { font-size:0.95rem; color:var(--tm); max-width:540px; margin:0 auto; line-height:1.65; }

/* Scroll-reveal base states */
.rv { opacity:0; transform:translateY(32px); transition:opacity 0.7s var(--ease), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
.rv.on { opacity:1; transform:translateY(0); }
.rv-s { opacity:0; transform:scale(0.91); transition:opacity 0.7s var(--ease), transform 0.7s var(--spring); }
.rv-s.on { opacity:1; transform:scale(1); }

/* ═══════════════════════════════════════════════════════════════
   11. SERVICES — tall glass cards with 3D tilt
═══════════════════════════════════════════════════════════════ */
#services { border-bottom:1px solid var(--border); }
.svc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.svc-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset, 0 24px 60px rgba(0,0,0,0.45);
  border-radius: var(--r-l);
  padding: 36px 28px;
  min-height: 360px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
  will-change: transform;
}
.svc-card:hover {
  border-color: rgba(99,102,241,0.45);
  background: rgba(99,102,241,0.06);
  box-shadow:
    0 0 0 1px var(--bh),
    0 24px 60px rgba(0,0,0,0.5),
    0 0 32px rgba(99,102,241,0.08);
}
.svc-ico {
  width:48px; height:48px; border-radius:var(--r-m);
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.18);
  display:flex; align-items:center; justify-content:center;
  color: var(--purple-l);
  margin-bottom:20px;
  flex-shrink:0;
}
.svc-ico svg { width:22px; height:22px; }
.svc-title { font-size:1.1rem; font-weight:800; margin-bottom:10px; }
.svc-desc  { font-size:0.875rem; color:var(--tm); line-height:1.7; flex:1; }

/* ═══════════════════════════════════════════════════════════════
   12. SKILLS (full-width glass panel)
═══════════════════════════════════════════════════════════════ */
#skills {
  background: var(--bg2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.skills-surface {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 24px 60px rgba(0,0,0,0.35);
  border-radius: var(--r-xl);
  padding: 40px;
}

.skill-tabs { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:36px; }
.stab {
  padding: 9px 20px; border-radius: var(--r-m);
  font-size: 0.825rem; font-weight: 700;
  color: var(--tm);
  background: rgba(120,120,128,0.08);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  border: 1px solid var(--border);
  transition: var(--t3); cursor: none;
}
.stab.on {
  background: var(--purple); color: #fff; border-color: var(--purple);
  box-shadow: 0 0 0 1px rgba(99,102,241,0.3), 0 0 20px rgba(99,102,241,0.2);
}
.stab:hover:not(.on) {
  border-color: rgba(99,102,241,0.4);
  color: var(--t);
  background: rgba(99,102,241,0.07);
}

/* Level legend */
.s-legend { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-bottom:32px; }
.s-leg { display:flex; align-items:center; gap:7px; font-size:0.72rem; font-weight:700; color:var(--tm); }
.s-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.s-dot.expert     { background:#A78BFA; box-shadow:0 0 8px rgba(139,92,246,0.5); }
.s-dot.advanced   { background:#5E9CF5; box-shadow:0 0 8px rgba(99,102,241,0.4); }
.s-dot.proficient { background:#4ADE80; box-shadow:0 0 8px rgba(52,211,153,0.4); }
.s-dot.beginner   { background:rgba(255,255,255,0.65); }

/* Skill cloud */
.s-pane { display:none; }
.s-pane.on { display:block; }
.s-cloud { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:860px; margin:0 auto; }

.stag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--r-m);
  font-size: 0.85rem; font-weight: 700; border: 1px solid;
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  transition: transform 0.4s var(--spring), box-shadow 0.3s, background 0.3s, border-color 0.3s;
  position: relative;
}
.stag:hover { transform:translateY(-5px) scale(1.06); }

.stag.expert {
  background: rgba(139,92,246,0.08);
  border-color: rgba(139,92,246,0.28);
  color: #A78BFA;
}
.stag.expert:hover {
  background: rgba(139,92,246,0.14);
  border-color: rgba(139,92,246,0.5);
  box-shadow: 0 10px 28px rgba(139,92,246,0.2);
}
.stag.advanced {
  background: rgba(99,102,241,0.08);
  border-color: rgba(99,102,241,0.28);
  color: var(--purple-l);
}
.stag.advanced:hover {
  background: rgba(99,102,241,0.14);
  border-color: rgba(99,102,241,0.5);
  box-shadow: 0 10px 28px rgba(99,102,241,0.2);
}
.stag.proficient {
  background: rgba(52,211,153,0.08);
  border-color: rgba(52,211,153,0.25);
  color: #4ADE80;
}
.stag.proficient:hover {
  background: rgba(52,211,153,0.14);
  border-color: rgba(52,211,153,0.45);
  box-shadow: 0 10px 28px rgba(52,211,153,0.15);
}
.stag.beginner {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.72);
}
.stag.beginner:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 10px 28px rgba(255,255,255,0.04);
}

.stag-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.stag.expert    .stag-dot { background:#A78BFA; box-shadow:0 0 6px rgba(139,92,246,0.5); }
.stag.advanced  .stag-dot { background:#5E9CF5; box-shadow:0 0 6px rgba(99,102,241,0.4); }
.stag.proficient .stag-dot { background:#4ADE80; box-shadow:0 0 6px rgba(52,211,153,0.4); }
.stag.beginner  .stag-dot { background:rgba(255,255,255,0.6); }

.stag-yr { font-size:0.62rem; font-weight:700; opacity:0.55; letter-spacing:0.04em; font-family:var(--fmono); }

/* ═══════════════════════════════════════════════════════════════
   13. EXPERIENCE — TWO-PANE SELECTOR
═══════════════════════════════════════════════════════════════ */
#experience { border-bottom:1px solid var(--border); }

.glass-panel {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 16px 48px rgba(0,0,0,0.35);
  border-radius: var(--r-l);
}

.exp-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 16px;
  max-width: 960px;
  margin: 0 auto;
  align-items: start;
}
.exp-selector {
  overflow: hidden;
}
.exp-sel-item {
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  cursor: none;
  transition: background 0.15s, border-left-color 0.15s;
  display: flex;
  flex-direction: column;
  gap: 3px;
  background: transparent;
  border-left: 2px solid transparent;
}
.exp-sel-item:last-child { border-bottom: none; }
.exp-sel-item:hover { background: rgba(255,255,255,0.05); }
.exp-sel-item.active {
  background: rgba(99,102,241,0.1);
  border-left: 2px solid var(--purple);
}
.exp-sel-title  { font-size: 0.82rem; font-weight: 700; color: var(--t); }
.exp-sel-co     { font-size: 0.72rem; color: var(--purple-l); font-weight: 600; }
.exp-sel-period { font-size: 0.65rem; color: var(--tm); font-family: var(--fmono); }

.exp-detail {
  padding: 28px;
  transition: opacity 0.15s ease;
  min-height: 280px;
}
.exp-detail-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.exp-title  { font-size: 1.1rem; font-weight: 800; }
.exp-co     { font-size: 0.9rem; font-weight: 700; color: var(--purple-l); margin-bottom: 14px; }
.exp-desc   { font-size: 0.875rem; color: var(--tm); line-height: 1.7; margin-bottom: 16px; }
.exp-tags   { display:flex; flex-wrap:wrap; gap:6px; }
.exp-tag {
  padding:3px 10px;
  background: rgba(120,120,128,0.12);
  border:1px solid var(--border);
  border-radius:var(--r-s);
  font-size:0.68rem; font-weight:700;
  color:var(--tm); font-family:var(--fmono); letter-spacing:0.02em;
}
.exp-badge {
  font-size: 0.7rem; font-weight: 700;
  padding: 4px 11px; border-radius: var(--r-s);
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.22);
  color: var(--purple-l);
  white-space: nowrap; flex-shrink: 0;
}
.exp-cur-badge {
  background: rgba(52,211,153,0.1);
  border-color: rgba(52,211,153,0.28);
  color: var(--green);
}

/* Mobile: stack vertically */
@media (max-width: 768px) {
  .exp-layout {
    grid-template-columns: 1fr;
  }
  .exp-selector {
    display: flex;
    flex-direction: column;
  }
}

/* ═══════════════════════════════════════════════════════════════
   14. CERTIFICATIONS — enhanced glass grid
═══════════════════════════════════════════════════════════════ */
#certifications { background:var(--bg2); border-top:1px solid var(--border); }
.cert-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:18px; }
.cert-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 16px 40px rgba(0,0,0,0.3);
  border-radius: var(--r-l);
  padding: 24px 18px; text-align:center;
  transition: border-color 0.3s, box-shadow 0.3s;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(24px);
  will-change: transform;
}
.cert-card.on {
  animation:cert-in 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes cert-in { to { opacity:1; transform:translateY(0); } }
.cert-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--purple-g), transparent);
  opacity:0; transition:opacity 0.3s;
  pointer-events: none;
}
.cert-card:hover {
  border-color:var(--bh);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 0 0 1px var(--bh),
    0 20px 60px rgba(0,0,0,0.45);
}
.cert-card:hover::after { opacity:1; }
.cert-ico {
  width:44px; height:44px; border-radius:var(--r-m);
  background: rgba(120,120,128,0.12);
  border: 1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px;
  color: var(--tm);
}
.cert-ico svg { width:20px; height:20px; }
.cert-name { font-size:0.78rem; font-weight:700; color:var(--t); line-height:1.4; position:relative; z-index:1; }
.cert-year { font-size:0.65rem; color:var(--td); margin-top:6px; font-family:var(--fmono); position:relative; z-index:1; }

/* ═══════════════════════════════════════════════════════════════
   15. EDUCATION
═══════════════════════════════════════════════════════════════ */
#education { border-top:1px solid var(--border); }
.edu-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:22px; max-width:840px; margin:0 auto; }
.edu-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 16px 40px rgba(0,0,0,0.3);
  border-radius: var(--r-l);
  padding: 28px 24px;
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.4s var(--spring);
}
.edu-card:hover {
  border-color:var(--bh);
  transform:translateY(-6px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 0 0 1px var(--bh),
    0 20px 60px rgba(0,0,0,0.45);
}
.edu-ico {
  width:44px; height:44px; border-radius:var(--r-m);
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.18);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:16px;
  color: var(--purple-l);
}
.edu-ico svg { width:20px; height:20px; }
.edu-deg  { font-size:1rem; font-weight:800; margin-bottom:6px; line-height:1.3; }
.edu-sch  { font-size:0.875rem; font-weight:700; color:var(--purple-l); margin-bottom:4px; }
.edu-per  { font-size:0.78rem; color:var(--tm); }

/* ═══════════════════════════════════════════════════════════════
   16. CONTACT — centered column
═══════════════════════════════════════════════════════════════ */
#contact { background:var(--bg2); border-top:1px solid var(--border); }
.contact-col {
  max-width: 560px;
  margin: 0 auto;
}
.contact-col h3 { font-size:1.5rem; font-weight:900; letter-spacing:-0.02em; margin-bottom:12px; text-align:center; }
.contact-col p  { color:var(--tm); line-height:1.7; margin-bottom:28px; text-align:center; }

.avail {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 8px 16px; border-radius: var(--r-l);
  background: rgba(52,211,153,0.08);
  backdrop-filter: blur(8px) saturate(150%);
  -webkit-backdrop-filter: blur(8px) saturate(150%);
  border: 1px solid rgba(52,211,153,0.22);
  color: var(--green); font-size: 0.8rem; font-weight: 700;
  margin-bottom: 24px;
}
.avail-dot {
  width:8px; height:8px; background:var(--green); border-radius:50%;
  box-shadow:0 0 0 0 var(--green-g);
  animation: avail-pulse 2s infinite;
  flex-shrink: 0;
}
@keyframes avail-pulse {
  0%   { box-shadow:0 0 0 0 rgba(52,211,153,0.5); }
  70%  { box-shadow:0 0 0 10px rgba(52,211,153,0); }
  100% { box-shadow:0 0 0 0 rgba(52,211,153,0); }
}

.c-links { display:flex; flex-direction:column; gap:12px; }
.c-link {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(48px) saturate(200%);
  -webkit-backdrop-filter: blur(48px) saturate(200%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset;
  border-radius: var(--r-m); color: var(--t);
  transition: border-color 0.3s, background 0.3s, transform 0.3s var(--ease), box-shadow 0.3s;
}
.c-link:hover {
  border-color:var(--bh); background:rgba(99,102,241,0.06);
  transform:translateX(7px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 0 0 1px var(--bh),
    0 8px 32px rgba(0,0,0,0.3);
}
.c-ico {
  width:42px; height:42px; border-radius:var(--r-m);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  background: rgba(120,120,128,0.14);
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.72);
}
.c-ico svg { width:18px; height:18px; }
.c-txt .lbl { font-size:0.65rem; font-weight:800; color:var(--tm); text-transform:uppercase; letter-spacing:0.1em; }
.c-txt .val { font-size:0.9rem; font-weight:700; }

/* ═══════════════════════════════════════════════════════════════
   17. FOOTER
═══════════════════════════════════════════════════════════════ */
#footer {
  border-top:1px solid var(--border);
  padding:36px clamp(20px,5vw,80px) 120px;
  display:flex; justify-content:center; align-items:center;
  flex-wrap:wrap; gap:16px; flex-direction: column;
  text-align: center;
}
.foot-logo {
  font-size:1rem; font-weight:900;
  background:linear-gradient(135deg,var(--purple-l),var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.foot-copy { font-size:0.75rem; color:var(--td); }
.foot-links { display:flex; gap:22px; }
.foot-links a { font-size:0.78rem; color:var(--tm); transition:color 0.25s; }
.foot-links a:hover { color:var(--t); }

/* ═══════════════════════════════════════════════════════════════
   18. RESPONSIVE BREAKPOINTS
═══════════════════════════════════════════════════════════════ */
@media (max-width:1024px) {
  .svc-grid { grid-template-columns:1fr 1fr; }
  .edu-grid { grid-template-columns:1fr; max-width:500px; }
}
@media (max-width:768px) {
  .stats-row    { grid-template-columns:repeat(2,1fr); }
  .svc-grid     { grid-template-columns:1fr; }
  .cert-grid    { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
  .scroll-hint  { display:none; }
  #footer       { padding-bottom: 100px; }
}
@media (max-width:480px) {
  .stats-row    { grid-template-columns:1fr 1fr; gap:16px; }
  .btns         { flex-direction:column; align-items:center; }
  .btn          { width:100%; justify-content:center; }
  .skills-surface { padding: 24px 16px; }
}

/* ═══════════════════════════════════════════════════════════════
   19. TOUCH/MOBILE — disable custom cursor
═══════════════════════════════════════════════════════════════ */
@media (hover: none), (pointer: coarse) {
  body, button, a { cursor: auto !important; }
  #cur-dot, #cur-ring { display: none !important; }
  .exp-sel-item { cursor: pointer; }
  .stab { cursor: pointer; }
  .lang-btn { cursor: pointer; }
}

</style>
</head>
<body>

<!-- Scroll progress -->
<div id="spbar"></div>

<!-- Custom cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- Language island: top-right, always visible -->
<div class="lang-island">
  <div class="lang-wrap" id="lang-wrap"></div>
</div>

<!-- Bottom dock navigation -->
<nav id="dock">
  <div class="dock-glass">
    <ul id="nav-links"></ul>
  </div>
</nav>

<!-- ════════════════════════════ HERO ════════════════════════════ -->
<section id="hero">
  <div class="aurora">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="hero-center" id="hero-center"></div>

  <div class="scroll-hint" onclick="scrollTo(0,window.innerHeight)">
    <span id="scroll-hint-lbl">Scroll</span>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</section>

<!-- ════════════════════════════ STATS ════════════════════════════ -->
<section id="stats">
  <div class="stats-row" id="stats-row"></div>
</section>

<!-- ════════════════════════════ MARQUEE ════════════════════════════ -->
<div id="marquee"></div>

<!-- ════════════════════════════ SERVICES ════════════════════════════ -->
<section class="sec" id="services">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow">What I Do</span>
      <h2 class="sec-title" id="svc-title"></h2>
      <p class="sec-sub" id="svc-sub"></p>
    </div>
    <div class="svc-grid" id="svc-grid"></div>
  </div>
</section>

<!-- ════════════════════════════ SKILLS ════════════════════════════ -->
<section class="sec" id="skills">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="sk-eye"></span>
      <h2 class="sec-title" id="sk-title"></h2>
      <p class="sec-sub" id="sk-sub"></p>
    </div>
    <div class="skills-surface rv">
      <div id="skills-inner"></div>
    </div>
  </div>
</section>

<!-- ════════════════════════════ EXPERIENCE ════════════════════════════ -->
<section class="sec" id="experience">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="exp-eye"></span>
      <h2 class="sec-title" id="exp-title"></h2>
    </div>
    <div id="exp-list"></div>
  </div>
</section>

<!-- ════════════════════════════ CERTIFICATIONS ════════════════════════════ -->
<section class="sec" id="certifications">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="cert-eye"></span>
      <h2 class="sec-title" id="cert-title"></h2>
      <p class="sec-sub" id="cert-sub"></p>
    </div>
    <div class="cert-grid" id="cert-grid"></div>
  </div>
</section>

<!-- ════════════════════════════ EDUCATION ════════════════════════════ -->
<section class="sec" id="education">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="edu-eye"></span>
      <h2 class="sec-title" id="edu-title"></h2>
    </div>
    <div class="edu-grid" id="edu-grid"></div>
  </div>
</section>

<!-- ════════════════════════════ CONTACT ════════════════════════════ -->
<section class="sec" id="contact">
  <div class="sec-wrap">
    <div class="sec-head rv">
      <span class="eyebrow" id="con-eye"></span>
      <h2 class="sec-title" id="con-title"></h2>
    </div>
    <div id="con-grid"></div>
  </div>
</section>

<!-- ════════════════════════════ FOOTER ════════════════════════════ -->
<footer id="footer">
  <span class="foot-logo" id="foot-logo"></span>
  <span class="foot-copy" id="foot-copy"></span>
  <div class="foot-links" id="foot-links"></div>
</footer>


<script>
// ═══════════════════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════════════════
let D = null;
let LANG = localStorage.getItem('cv_lang') || 'en';
const ALL_LANGS  = ['en','nl','es','fr','de'];
const LANG_LABEL = {en:'EN',nl:'NL',es:'ES',fr:'FR',de:'DE'};

// ═══════════════════════════════════════════════════════════════
// SVG ICON LIBRARY  (unified line-icon style, stroke-width 1.5)
// ═══════════════════════════════════════════════════════════════

function t(k) { return (T[LANG]||T.en)[k] ?? (T.en)[k] ?? ''; }

// i18n field from cv.json (falls back to en value)
function lc(obj, field) {
  const i18n = D?.i18n?.[LANG];
  if (i18n?.[field]) return i18n[field];
  return obj?.[field] ?? '';
}

// BOOT
// ═══════════════════════════════════════════════════════════════
async function boot() {
  try {
    const res = await fetch('./data/cv.json');
    D = await res.json();
  } catch(e) {
    D = {};
  }
  render();
  // one-time inits that don't change on language switch
  initCursor();
  initScrollProgress();
  initNavStuck();
  typeRole();
}

// FULL RENDER (called on load + language switch)
// ═══════════════════════════════════════════════════════════════

  renderNav();
  renderHero();
  renderStats();
  renderMarquee();
  renderServices();
  renderSkills();
  renderExperience();
  renderCerts();
  renderEducation();
  renderContact();
  renderFooter();
  // Re-initialise scroll animations after DOM changes
  initReveal();
  initCountUp();
  initMagnetic();
  initTilt();
}

// ═══════════════════════════════════════════════════════════════
// LANGUAGE SWITCH
// ═══════════════════════════════════════════════════════════════
function setLang(l) {
  LANG = l;
  localStorage.setItem('cv_lang', l);
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity 0.2s ease';
  setTimeout(() => {
    render();
    typeRole();
    document.body.style.opacity = '1';
  }, 200);
}

// ═══════════════════════════════════════════════════════════════
// RENDER: NAV (bottom dock)
// ═══════════════════════════════════════════════════════════════
function renderNav() {
  const nav   = t('nav');
  const navId = t('navId');

  // Dock items
  document.getElementById('nav-links').innerHTML =
    nav.map((label, i) => {
      const id  = navId[i];
      const ico = NAV_ICONS[id] || NAV_ICONS.hero;
      return `<li>
        <a href="#${id}" class="dock-item" onclick="closeMob()">
          <span class="dock-icon">${ico}</span>
          <span class="dock-label">${label}</span>
        </a>
      </li>`;
    }).join('');

  // Language island (top-right)
  document.getElementById('lang-wrap').innerHTML =
    ALL_LANGS.map(l =>
      `<button class="lang-btn${LANG===l?' on':''}" onclick="setLang('${l}')">${LANG_LABEL[l]}</button>`
    ).join('');
}

// ═══════════════════════════════════════════════════════════════
// TYPEWRITER EFFECT
// ═══════════════════════════════════════════════════════════════
let _typeTimer = null;
function typeRole() {
  const el = document.getElementById('typed-text');
  if (!el) return;
  clearTimeout(_typeTimer);
  el.textContent = '';
  const text = window._role || '';
  let i = 0;
  function next() {
    if (i < text.length) { el.textContent += text[i++]; _typeTimer = setTimeout(next, 55); }
  }
  _typeTimer = setTimeout(next, 400);
}

// ═══════════════════════════════════════════════════════════════
// RENDER: SKILLS
// ═══════════════════════════════════════════════════════════════
function renderSkills() {
  document.getElementById('sk-eye').textContent   = t('skEye');
  document.getElementById('sk-title').textContent = t('skTitle');
  document.getElementById('sk-sub').textContent   = t('skSub');

  const tabs   = D?.skillTabs || {};
  const keys   = Object.keys(tabs);
  const tLbls  = t('tabs') || {};
  const lLbls  = t('levels') || {};
  const yrLbl  = t('yr') || 'yr';

  const yearsToLevel = y => y >= 4 ? 'expert' : y >= 2 ? 'advanced' : y >= 1 ? 'proficient' : 'beginner';

  const makeTag = s => {
    const lvl = yearsToLevel(s.years);
    const yr  = s.years ? `<span class="stag-yr">${s.years}${yrLbl}</span>` : '';
    return `<span class="stag ${lvl}"><span class="stag-dot"></span>${s.n}${yr}</span>`;
  };

  const legend = `
    <div class="s-legend">
      ${['expert','advanced','proficient','beginner'].map(l =>
        `<div class="s-leg"><div class="s-dot ${l}"></div><span>${lLbls[l]||l}</span></div>`
      ).join('')}
    </div>`;

  const allKeys = [...keys, 'all'];
  const tabBtns = allKeys.map((k,i) =>
    `<button class="stab${i===0?' on':''}" id="stab-${k}" onclick="switchSkillTab('${k}')">${tLbls[k]||k}</button>`
  ).join('');

  const panes = keys.map((k,i) =>
    `<div class="s-pane${i===0?' on':''}" id="sp-${k}">
      <div class="s-cloud">${tabs[k].map(makeTag).join('')}</div>
    </div>`
  ).join('');

  const allSkills = keys.flatMap(k => tabs[k]);
  const allPane = `<div class="s-pane" id="sp-all"><div class="s-cloud">${allSkills.map(makeTag).join('')}</div></div>`;

  document.getElementById('skills-inner').innerHTML =
    `<div class="skill-tabs">${tabBtns}</div>` + legend + panes + allPane;
}

function switchSkillTab(key) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.s-pane').forEach(p => p.classList.remove('on'));
  document.getElementById('stab-' + key)?.classList.add('on');
  document.getElementById('sp-' + key)?.classList.add('on');
}

  const detail = document.getElementById('exp-detail');
  if (!detail) return;
  detail.style.opacity = '0';
  setTimeout(() => {
    detail.innerHTML = `
      <div class="exp-detail-head">
        <div>
          <h3 class="exp-title">${e.title}</h3>
          <div class="exp-co">${e.co}</div>
        </div>
        <span class="exp-badge${e.cur?' exp-cur-badge':''}">${e.period}</span>
      </div>
      <p class="exp-desc">${e.desc}</p>
      ${tags ? `<div class="exp-tags">${tags}</div>` : ''}

    detail.style.opacity = '1';
  }, 150);
};

// ═══════════════════════════════════════════════════════════════
// CUSTOM CURSOR
// ═══════════════════════════════════════════════════════════════
function initCursor() {
  if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;

  const dot  = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  let rx = 0, ry = 0, mx = 0, my = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top  = my + 'px';
  }, {passive:true});

  function trackRing() {
    rx += (mx - rx) * 0.14;
    ry += (my - ry) * 0.14;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(trackRing);
  }
  trackRing();

  document.addEventListener('mouseover', e => {
    if (e.target.closest('a,button,.stag,.svc-card,.cert-card,.c-link,.exp-sel-item')) {
      dot.classList.add('hov'); ring.classList.add('hov');
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a,button,.stag,.svc-card,.cert-card,.c-link,.exp-sel-item')) {
      dot.classList.remove('hov'); ring.classList.remove('hov');
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// DOCK: active item highlighting on scroll
// ═══════════════════════════════════════════════════════════════
function initNavStuck() {
  function updateActive() {
    const ids = t('navId');
    const top = window.scrollY + 100;
    let cur = ids[0];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.getBoundingClientRect().top + window.scrollY <= top) cur = id;
    });
    document.querySelectorAll('.dock-item').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + cur);
    });
  }
  window.addEventListener('scroll', updateActive, {passive:true});
  updateActive();
}

// ═══════════════════════════════════════════════════════════════
// SCROLL REVEAL
// ═══════════════════════════════════════════════════════════════
function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); }
    });
  }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv,.rv-s').forEach(el => obs.observe(el));

  // Cert grid stagger
  const certObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.querySelectorAll('.cert-card').forEach((card,i) => {
        setTimeout(() => card.classList.add('on'), i * 65);
      });
      certObs.unobserve(entry.target);
    });
  }, {threshold:0.05});
  const cg = document.getElementById('cert-grid');
  if (cg) certObs.observe(cg);
}

// ═══════════════════════════════════════════════════════════════
// COUNT-UP ANIMATION
// ═══════════════════════════════════════════════════════════════
function initCountUp() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const el  = e.target;
      const raw = el.dataset.raw || '';
      const m   = raw.match(/^([\d.]+)(.*)/);
      if (!m) return;
      const target  = parseFloat(m[1]);
      const suffix  = m[2];
      let current   = 0;
      const step    = target / 50;
      const tick    = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = (Number.isInteger(target) ? Math.floor(current) : current.toFixed(1)) + suffix;
        if (current >= target) clearInterval(tick);
      }, 18);
      obs.unobserve(el);
    });
  }, {threshold:0.6});
  document.querySelectorAll('.stat-n[data-raw]').forEach(el => obs.observe(el));
}

// ═══════════════════════════════════════════════════════════════
// MAGNETIC BUTTONS
// ═══════════════════════════════════════════════════════════════
function initMagnetic() {
  if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;
  document.querySelectorAll('.magnetic').forEach(el => {
    el.addEventListener('mousemove', e => {
      const r  = el.getBoundingClientRect();
      const dx = (e.clientX - r.left - r.width  / 2) * 0.28;
      const dy = (e.clientY - r.top  - r.height / 2) * 0.28;
      el.style.transform = `translate(${dx}px,${dy}px)`;
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = '';
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// 3D TILT EFFECT on service + cert cards
// ═══════════════════════════════════════════════════════════════
function initTilt() {
  if (window.matchMedia('(hover: none), (pointer: coarse)').matches) return;
  document.querySelectorAll('.svc-card, .cert-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform = `perspective(600px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateZ(8px)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// CLICK RIPPLE on .btn elements
// ═══════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const r    = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});
